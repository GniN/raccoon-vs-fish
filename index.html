<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raccoon vs. Leg Fish</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="stage">
    <header class="hud">
      <div class="hud-left">
        <span class="hud-label">Time</span>
        <span id="score" class="hud-value">0.0</span>
      </div>
      <div class="hud-right">
        <span class="hud-label">Best</span>
        <span id="best" class="hud-value">0.0</span>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="game" width="800" height="600" aria-label="Raccoon dodge game"></canvas>

      <div id="overlay" class="overlay overlay-menu">
        <div class="panel">
          <h1>Raccoon vs. Leg Fish</h1>
          <p class="tagline">A fish grew legs. It is jogging toward you. Do not let it touch you.</p>
          <ul class="controls">
            <li><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> — move</li>
            <li><kbd>Space</kbd> — start / restart</li>
          </ul>
          <p id="overlay-action" class="action">Press <kbd>Space</kbd> to start</p>
        </div>
      </div>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
